{% extends "base.html" %}

{% block content %}
<div class="home-hero">
    <div class="home-card">
        <div class="home-text">
            <h1>Pav<span>Eats</span></h1>
            <p>See what UC Merced students really think about Pavilion food.</p>
            <p>Post reviews, check the menu, and vote on what should come next.</p>

            {% if current_user.is_authenticated %}
                <a class="btn" href="{{ url_for('feed') }}">Get Started</a>
            {% else %}
                <a class="btn" href="{{ url_for('signup') }}">Get Started</a>
            {% endif %}
        </div>

        <img class="home-logo"
             src="{{ url_for('static', filename='resources/Uc_merced_logo.png') }}"
             alt="UC Merced logo">
    </div>
</div>
{% endblock %}
