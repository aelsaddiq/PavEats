<!DOCTYPE html>
<html>
<head>
    <title>PavEats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<script>

function toggleDarkMode() {

    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
}

</script>

<script>
function sharePost(url) {

    navigator.clipboard.writeText(url);

    alert("Link copied!");
}
</script>

<script>

function toggleComments(button) {

    const postBody = button.closest(".post-body");

    const comments = postBody.querySelector(".comments");

    comments.classList.toggle("show-comments");
}

</script>

<body>

<nav>
    <a href="{{ url_for('index') }}">
    <strong>PavEats</strong>
</a>
    <div>
        {% if current_user.is_authenticated %}
    <a href="{{ url_for('feed') }}">Feed</a>
    <a href="{{ url_for('polls') }}">Polls</a>
    <a href="{{ url_for('menu') }}">Menu</a>
    <a href="{{ url_for('profile', user_id=current_user.id) }}">Profile</a>
    <a href="{{ url_for('settings') }}">Settings</a>
{% else %}
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('signup') }}">Sign Up</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p class="flash">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
